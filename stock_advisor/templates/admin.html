<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>基金理财助手后台</title>
  <link rel="stylesheet" href="/static/admin.css?v=20260607-held-metrics">
</head>
<body>
  <header>
    <div class="bar">
      <h1>基金理财助手后台</h1>
      <div class="toolbar">
        <span id="status" class="status">已登录</span>
        <button class="secondary" onclick="loadAll()">刷新</button>
        <button class="secondary" onclick="logout()">退出</button>
      </div>
    </div>
  </header>
  <main>
    <div>
      <section>
        <h2>组合概览</h2>
        <div class="metrics">
          <div class="metric"><span class="muted">持仓数量</span><b id="positionCount">-</b></div>
          <div class="metric"><span class="muted">候选数量</span><b id="universeCount">-</b></div>
          <div class="metric"><span class="muted">交易记录</span><b id="tradeCount">-</b></div>
        </div>
        <table class="desktop-table positions-table">
          <thead>
            <tr>
              <th>基金</th>
              <th>本金</th>
              <th>份额</th>
              <th>成本价</th>
              <th>操作</th>
            </tr>
          </thead>
          <tbody id="positionsBody"></tbody>
        </table>
        <div id="positionsCards" class="mobile-list"></div>
      </section>
      <section>
        <h2>候选基金池</h2>
        <div class="toolbar">
          <button class="secondary" onclick="refreshHotFunds()">刷新热门前十</button>
          <span class="muted">点击基金行查看净值趋势</span>
        </div>
        <table class="desktop-table trend-table">
          <thead><tr><th>基金</th><th>净值</th><th>日涨</th><th>近1周</th><th>近1月</th><th>近3月</th><th>近6月</th><th>近1年</th></tr></thead>
          <tbody id="universeBody"></tbody>
        </table>
        <div id="universeCards" class="mobile-list"></div>
        <div id="chartPanelHome" class="chart-panel-home">
        <div id="chartPanel" class="chart-panel hidden" onclick="event.stopPropagation()">
          <div class="chart-header">
            <div>
              <b id="chartTitle">净值趋势</b>
              <span id="chartMeta" class="muted"></span>
            </div>
            <button class="icon-button" type="button" onclick="closeChartPanel(event)" title="关闭趋势图">×</button>
          </div>
          <canvas id="fundChart" width="900" height="320"></canvas>
        </div>
        </div>
      </section>
      <section>
        <h2>交易流水</h2>
        <table class="desktop-table">
          <thead><tr><th>时间</th><th>基金</th><th>动作</th><th>金额</th><th>净值</th><th>份额</th></tr></thead>
          <tbody id="tradesBody"></tbody>
        </table>
        <div id="tradesCards" class="mobile-list"></div>
      </section>
    </div>
    <div>
      <section>
        <h2 id="fundFormTitle">新增持仓</h2>
        <input id="fundMode" type="hidden" value="add">
        <div class="grid">
          <label><span>基金代码</span><input id="fundSymbol" placeholder="007509" onblur="autoLookupFund()"></label>
          <label><span>基金名称</span><input id="fundName" placeholder="华商润丰灵活配置混合C"></label>
          <label><span>本金/成本金额</span><input id="fundPrincipal" type="number" step="0.01"></label>
          <label><span>持有份额</span><input id="fundShares" type="number" step="0.0001"></label>
          <label><span>成本价</span><input id="fundCostBasis" type="number" step="0.0001"></label>
        </div>
        <div class="toolbar form-actions">
          <button class="secondary" onclick="lookupFund()">查询基金</button>
          <button id="saveFundButton" onclick="saveFund()">新增持仓</button>
          <button class="secondary" onclick="clearFundForm()">清空</button>
        </div>
        <div class="grid three form-subgrid">
          <label><span>持有总金额</span><input id="calcMarketValue" type="number" step="0.01"></label>
          <label><span>当前净值</span><input id="calcNav" type="number" step="0.0001"></label>
          <label><span>持有收益</span><input id="calcGain" type="number" step="0.01"></label>
        </div>
        <div class="toolbar form-actions">
          <button class="secondary" onclick="fillFromHolding()">按金额/净值/收益反算</button>
        </div>
      </section>
      <section>
        <h2>净值覆盖</h2>
        <div class="grid">
          <label><span>基金代码</span><input id="overrideSymbol" placeholder="007509"></label>
          <label><span>当前净值</span><input id="overridePrice" type="number" step="0.0001"></label>
          <label><span>上一净值</span><input id="overridePrevious" type="number" step="0.0001"></label>
          <label><span>日期</span><input id="overrideDate" placeholder="2026-06-06 手动更新"></label>
        </div>
        <div class="toolbar form-actions">
          <button onclick="saveOverride()">保存净值</button>
          <button class="danger" onclick="deleteOverride()">删除覆盖</button>
        </div>
        <table class="desktop-table">
          <thead><tr><th>代码</th><th>当前净值</th><th>上一净值</th><th>日期</th></tr></thead>
          <tbody id="overridesBody"></tbody>
        </table>
        <div id="overridesCards" class="mobile-list"></div>
      </section>
      <section>
        <h2>交易维护</h2>
        <div class="grid">
          <label><span>基金代码</span><input id="tradeSymbol" placeholder="007509"></label>
          <label><span>动作</span><select id="tradeAction"><option value="buy">买入</option><option value="sell">卖出</option></select></label>
          <label><span>金额</span><input id="tradeAmount" type="number" step="0.01"></label>
          <label><span>成交净值</span><input id="tradeNav" type="number" step="0.0001"></label>
          <label><span>基金名称</span><input id="tradeName"></label>
        </div>
        <div class="toolbar form-actions">
          <button onclick="saveTrade()">记录交易</button>
        </div>
      </section>
      <section>
        <h2>分析推送</h2>
        <div class="toolbar">
          <button onclick="runAnalysis(true)">生成并推送钉钉</button>
          <button class="secondary" onclick="runAnalysis(false)">只生成报告</button>
        </div>
        <pre id="reportPreview">暂无报告</pre>
      </section>
    </div>
  </main>
  <script>
    window.FUND_ADVISOR_TOKEN = {{ token_json }};
  </script>
  <script src="/static/admin.js?v=20260607-held-metrics"></script>
</body>
</html>
